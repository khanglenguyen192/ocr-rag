version: "3.9"

services:
  # ── FastAPI Backend ──────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ocr_api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - ../LightOnOCR-2-1B:/app/LightOnOCR-2-1B:ro
      - uploads_data:/app/uploads
    env_file:
      - .env
    environment:
      - MODEL_DIR=/app/LightOnOCR-2-1B
      - UPLOAD_DIR=/app/uploads
    restart: unless-stopped

volumes:
  uploads_data:
